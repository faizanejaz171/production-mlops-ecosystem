name: MLOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4

      - name: Set up uv environment
        uses: astral-sh/setup-uv@v1

      - name: Sync dependencies via uv
        run: uv sync

      - name: Run batch validation script
        env:
          # Pass the GitHub secret as an environment variable to the script
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: uv run python validate_batch.py

      - name: Build production multi-stage Docker image
        run: docker build -t qa-validator:v2 .
